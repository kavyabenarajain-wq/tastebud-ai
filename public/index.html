<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Creative Co-pilot</title>
  <style>
    :root { --bg:#0e0e10; --fg:#f4f1ea; --mut:#8a8575; --accent:#c0825b; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--bg); color:var(--fg);
           font:16px/1.5 -apple-system, system-ui, sans-serif; }
    .card { text-align:center; padding:48px; }
    .dot { width:9px; height:9px; border-radius:50%; background:#3fb950; display:inline-block; margin-right:7px; }
    h1 { font-size:34px; font-weight:800; letter-spacing:-.02em; margin:0 0 6px; }
    .mut { color:var(--mut); }
    .keys { margin-top:18px; font:13px ui-monospace, monospace; color:var(--mut); }
    .accent { color:var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Creative Co-pilot</h1>
    <div class="mut">Clean slate — <span class="accent">ready to build.</span></div>
    <div class="keys" id="status"><span class="dot"></span>checking…</div>
  </div>
  <script>
    fetch("/api/health").then(r => r.json()).then(d => {
      document.getElementById("status").innerHTML =
        '<span class="dot"></span>server live · ' + (d.keysConfigured?.length || 0) + ' API keys loaded';
    }).catch(() => { document.getElementById("status").textContent = "server not responding"; });
  </script>
</body>
</html>
